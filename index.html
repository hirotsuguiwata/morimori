// Returns array of image URLs for a product. Uses gallery assignments if any;

window.imagesFor = function(product) {
  if (!product) return [];
  let assignments = {};
  try { assignments = JSON.parse(localStorage.getItem('877-image-assignments') || '{}'); } catch {}
  // If localStorage is empty, use baked-in defaults
  if (Object.keys(assignments).length === 0) {
    assignments = window.DEFAULT_IMAGE_ASSIGNMENTS || {};
  }
  const mine = Object.keys(assignments).filter(k => assignments[k] === product.id);
  if (mine.length > 0) {
    return mine.map(k => window.PDF_IMAGE_INDEX[k]).filter(Boolean);
  }
  return product.image ? [product.image] : [];
};

        {children}
      </div>

}

// ─────────────────────────────────────────────────────────────
// Navigation bar — glass pills + large title
// ─────────────────────────────────────────────────────────────
function IOSNavBar({ title = 'Title', dark = false, trailingIcon = true }) {
  const muted = dark ? 'rgba(255,255,255,0.6)' : '#404040';
  const text = dark ? '#fff' : '#000';
  const pillIcon = (content) => (
    <IOSGlassPill dark={dark}>
      <div style={{ width: 36, height: 36, display: 'flex', alignItems: 'center', justifyContent: 'center' }}>
        {content}
      </div>
    </IOSGlassPill>
  );
  return (
    <div style={{
      display: 'flex', flexDirection: 'column', gap: 10,
      paddingTop: 62, paddingBottom: 10, position: 'relative', zIndex: 5,
    }}>
      <div style={{
        display: 'flex', alignItems: 'center', justifyContent: 'space-between',
        padding: '0 16px',
      }}>
        {/* back chevron */}
        {pillIcon(
          <svg width="12" height="20" viewBox="0 0 12 20" fill="none" style={{ marginLeft: -1 }}>
            <path d="M10 2L2 10l8 8" stroke={muted} strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"/>
          </svg>
        )}
        {/* trailing ellipsis */}
        {trailingIcon && pillIcon(
          <svg width="22" height="6" viewBox="0 0 22 6">
            <circle cx="3" cy="3" r="2.5" fill={muted}/>
            <circle cx="11" cy="3" r="2.5" fill={muted}/>
            <circle cx="19" cy="3" r="2.5" fill={muted}/>
          </svg>
        )}
      </div>
      {/* large title */}
      <div style={{
        padding: '0 16px',
        fontFamily: '-apple-system, system-ui',
        fontSize: 34, fontWeight: 700, lineHeight: '41px',
        color: text, letterSpacing: 0.4,
      }}>{title}</div>
    </div>
  );
}

// ─────────────────────────────────────────────────────────────
// Grouped list (inset card, r:26) + row (52px)
// ─────────────────────────────────────────────────────────────
function IOSListRow({ title, detail, icon, chevron = true, isLast = false, dark = false }) {
  const text = dark ? '#fff' : '#000';
  const sec = dark ? 'rgba(235,235,245,0.6)' : 'rgba(60,60,67,0.6)';
  const ter = dark ? 'rgba(235,235,245,0.3)' : 'rgba(60,60,67,0.3)';
  const sep = dark ? 'rgba(84,84,88,0.65)' : 'rgba(60,60,67,0.12)';
  return (
    <div style={{
      display: 'flex', alignItems: 'center', minHeight: 52,
      padding: '0 16px', position: 'relative',
      fontFamily: '-apple-system, system-ui', fontSize: 17,
      letterSpacing: -0.43,
    }}>
      {icon && (
        <div style={{
          width: 30, height: 30, borderRadius: 7, background: icon,
          marginRight: 12, flexShrink: 0,
        }} />
      )}
      <div style={{ flex: 1, color: text }}>{title}</div>
      {detail && <span style={{ color: sec, marginRight: 6 }}>{detail}</span>}
      {chevron && (
        <svg width="8" height="14" viewBox="0 0 8 14" style={{ flexShrink: 0 }}>
          <path d="M1 1l6 6-6 6" stroke={ter} strokeWidth="2" fill="none" strokeLinecap="round" strokeLinejoin="round"/>
        </svg>
      )}
      {!isLast && (
        <div style={{
          position: 'absolute', bottom: 0, right: 0,
          left: icon ? 58 : 16, height: 0.5, background: sep,
        }} />
      )}
    </div>
  );
}

function IOSList({ header, children, dark = false }) {
  const hc = dark ? 'rgba(235,235,245,0.6)' : 'rgba(60,60,67,0.6)';
  const bg = dark ? '#1C1C1E' : '#fff';
  return (

      <div style={{
        background: bg, borderRadius: 26,
        margin: '0 16px', overflow: 'hidden',
      }}>{children}</div>
    </div>
  );
}

function IOSDevice({

// ─────────────────────────────────────────────────────────────
// Keyboard — iOS 26 liquid glass
// ─────────────────────────────────────────────────────────────
function IOSKeyboard({ dark = false }) {
  const glyph = dark ? 'rgba(255,255,255,0.7)' : '#595959';
  const sugg = dark ? 'rgba(255,255,255,0.6)' : '#333';
  const keyBg = dark ? 'rgba(255,255,255,0.22)' : 'rgba(255,255,255,0.85)';

  // special-key icons
  const icons = {
    shift: <svg width="19" height="17" viewBox="0 0 19 17"><path d="M9.5 1L1 9.5h4.5V16h8V9.5H18L9.5 1z" fill={glyph}/></svg>,
    del: <svg width="23" height="17" viewBox="0 0 23 17"><path d="M7 1h13a2 2 0 012 2v11a2 2 0 01-2 2H7l-6-7.5L7 1z" fill="none" stroke={glyph} strokeWidth="1.6" strokeLinejoin="round"/><path d="M10 5l7 7M17 5l-7 7" stroke={glyph} strokeWidth="1.6" strokeLinecap="round"/></svg>,
    ret: <svg width="20" height="14" viewBox="0 0 20 14"><path d="M18 1v6H4m0 0l4-4M4 7l4 4" fill="none" stroke="#fff" strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round"/></svg>,
  };

  const key = (content, { w, flex, ret, fs = 25, k } = {}) => (
    <div key={k} style={{
      height: 42, borderRadius: 8.5,
      flex: flex ? 1 : undefined, width: w, minWidth: 0,
      background: ret ? '#08f' : keyBg,
      boxShadow: '0 1px 0 rgba(0,0,0,0.075)',
      display: 'flex', alignItems: 'center', justifyContent: 'center',
      fontFamily: '-apple-system, "SF Compact", system-ui',
      fontSize: fs, fontWeight: 458, color: ret ? '#fff' : glyph,
    }}>{content}</div>
  );

  const row = (keys, pad = 0) => (
    <div style={{ display: 'flex', gap: 6.5, justifyContent: 'center', padding: `0 ${pad}px` }}>
      {keys.map(l => key(l, { flex: true, k: l }))}
    </div>
  );

  return (
    <div style={{
      position: 'relative', zIndex: 15, borderRadius: 27, overflow: 'hidden',
      padding: '11px 0 2px',
      display: 'flex', flexDirection: 'column', alignItems: 'center',
      boxShadow: dark
        ? '0 -2px 20px rgba(0,0,0,0.09)'
        : '0 -1px 6px rgba(0,0,0,0.018), 0 -3px 20px rgba(0,0,0,0.012)',
    }}>
      {/* liquid glass bg — same recipe as nav pills */}
      <div style={{
        position: 'absolute', inset: 0, borderRadius: 27,
        backdropFilter: 'blur(12px) saturate(180%)',
        WebkitBackdropFilter: 'blur(12px) saturate(180%)',
        background: dark ? 'rgba(120,120,128,0.14)' : 'rgba(255,255,255,0.25)',
      }} />
      <div style={{
        position: 'absolute', inset: 0, borderRadius: 27,
        boxShadow: dark
          ? 'inset 1.5px 1.5px 1px rgba(255,255,255,0.15)'
          : 'inset 1.5px 1.5px 1px rgba(255,255,255,0.7), inset -1px -1px 1px rgba(255,255,255,0.4)',
        border: dark ? '0.5px solid rgba(255,255,255,0.15)' : '0.5px solid rgba(0,0,0,0.06)',
        pointerEvents: 'none',
      }} />

      {/* autocorrect bar */}
      <div style={{
        display: 'flex', gap: 20, alignItems: 'center',
        padding: '8px 22px 13px', width: '100%', boxSizing: 'border-box',
        position: 'relative',
      }}>
        {['"The"', 'the', 'to'].map((w, i) => (
          <React.Fragment key={i}>
            {i > 0 && <div style={{ width: 1, height: 25, background: '#ccc', opacity: 0.3 }} />}
            <div style={{
              flex: 1, textAlign: 'center',
              fontFamily: '-apple-system, system-ui', fontSize: 17,
              color: sugg, letterSpacing: -0.43, lineHeight: '22px',
            }}>{w}</div>
          </React.Fragment>
        ))}
      </div>

      {/* key layout */}
      <div style={{
        display: 'flex', flexDirection: 'column', gap: 13,
        padding: '0 6.5px', width: '100%', boxSizing: 'border-box',
        position: 'relative',
      }}>
        {row(['q','w','e','r','t','y','u','i','o','p'])}
        {row(['a','s','d','f','g','h','j','k','l'], 20)}
        <div style={{ display: 'flex', gap: 14.25, alignItems: 'center' }}>
          {key(icons.shift, { w: 45, k: 'shift' })}
          <div style={{ display: 'flex', gap: 6.5, flex: 1 }}>
            {['z','x','c','v','b','n','m'].map(l => key(l, { flex: true, k: l }))}
          </div>
          {key(icons.del, { w: 45, k: 'del' })}
        </div>
        <div style={{ display: 'flex', gap: 6, alignItems: 'center' }}>
          {key('ABC', { w: 92.25, fs: 18, k: 'abc' })}
          {key('', { flex: true, k: 'space' })}
          {key(icons.ret, { w: 92.25, ret: true, k: 'ret' })}
        </div>
      </div>

      {/* bottom spacer (emoji+mic area, icons omitted) */}
      <div style={{ height: 56, width: '100%', position: 'relative' }} />
    </div>
  );
}

function ImageCarousel({ product, accent }) {
  const [idx, setIdx] = React.useState(0);
  const [refreshKey, setRefreshKey] = React.useState(0);
  // Re-compute images when assignments in localStorage change (e.g. gallery open in another tab)
  React.useEffect(() => {
    const onStorage = (e) => {
      if (e.key === '877-image-assignments') setRefreshKey(k => k + 1);
    };
    window.addEventListener('storage', onStorage);
    return () => window.removeEventListener('storage', onStorage);
  }, []);
  const imgs = React.useMemo(() => window.imagesFor(product), [product.id, refreshKey]);
  React.useEffect(() => { setIdx(0); }, [product.id]);
  const count = imgs.length;
  const cur = imgs[Math.min(idx, count - 1)] || product.image;
  const prev = () => setIdx(i => (i - 1 + count) % count);
  const next = () => setIdx(i => (i + 1) % count);

  // Touch swipe
  const touchX = React.useRef(null);
  const onTouchStart = e => { touchX.current = e.touches[0].clientX; };
  const onTouchEnd = e => {
    if (touchX.current == null) return;
    const dx = e.changedTouches[0].clientX - touchX.current;
    if (Math.abs(dx) > 40) { if (dx < 0) next(); else prev(); }
    touchX.current = null;
  };

  return (
    <div style={{ margin: '0 18px 14px', border: '1px solid #1F1B16', background: '#EFEAE1', position: 'relative' }}>
      <div style={{ position: 'relative', aspectRatio: '1/1', overflow: 'hidden' }}
           onTouchStart={onTouchStart} onTouchEnd={onTouchEnd}>
        <StagedImg src={cur} productKey={product.id}
          style={{ width: '100%', height: '100%', display: 'block', objectFit: 'cover' }} />
        {count > 1 && (
          <>
            <button onClick={prev} aria-label="前" style={{
              position: 'absolute', top: '50%', left: 8, transform: 'translateY(-50%)',
              width: 34, height: 34, borderRadius: '50%',
              background: 'rgba(31,27,22,0.7)', border: 'none', color: '#F5F0E6',
              cursor: 'pointer', fontSize: 16, fontFamily: 'inherit',
              display: 'flex', alignItems: 'center', justifyContent: 'center',
            }}>‹</button>
            <button onClick={next} aria-label="次" style={{

<script type="text/babel">
const { useState, useEffect } = React;

// Semaphore-based image loader to avoid rate-limiting avalanche
window.__imgQueue = window.__imgQueue || [];
window.__imgActive = 0;
window.__imgCache = window.__imgCache || {};
const MAX_CONCURRENT = 2;

async function loadImageBlob(src, attempt = 0) {
  try {
    // Append auth token from page URL to bypass 401 on serve endpoint
    const token = new URLSearchParams(location.search).get('t');
    const url = token ? src + (src.includes('?') ? '&' : '?') + 't=' + token : src;
    const r = await fetch(url);
    if (!r.ok) throw new Error('status ' + r.status);
    const b = await r.blob();
    return URL.createObjectURL(b);
  } catch (e) {
    if (attempt < 3) {
      await new Promise(res => setTimeout(res, 400 + attempt * 500));
      return loadImageBlob(src, attempt + 1);
    }
    return null;
  }
}

function processImgQueue() {
  while (window.__imgActive < MAX_CONCURRENT && window.__imgQueue.length > 0) {
    const { src, resolve } = window.__imgQueue.shift();
    window.__imgActive++;
    loadImageBlob(src).then(url => {
      window.__imgActive--;
      window.__imgCache[src] = url;
      resolve(url);
      processImgQueue();
    });
  }
}

function queueImageLoad(src) {
  if (window.__imgCache[src] !== undefined) return Promise.resolve(window.__imgCache[src]);
  return new Promise(resolve => {
    window.__imgQueue.push({ src, resolve });
    processImgQueue();
  });
}

function StagedImg({ src, style, className, productKey }) {
  const [loaded, setLoaded] = React.useState(() => window.__imgCache[src] || null);
  const [failed, setFailed] = React.useState(false);
  // productKey lets Tweaks override object-position per product
  const key = productKey || (src.startsWith('products/') ? src.replace('products/', '').replace(/\.\w+$/, '') : null);
  const [tick, setTick] = React.useState(0);
  React.useEffect(() => {
    const onPos = () => setTick(t => t + 1);
    window.addEventListener('__imgPosChanged', onPos);
    return () => window.removeEventListener('__imgPosChanged', onPos);
  }, []);
  const pos = key && window.__imgPositions && window.__imgPositions[key];
  const posStyle = pos ? { objectPosition: `${pos.x}% ${pos.y}%` } : null;
  React.useEffect(() => {
    let cancelled = false;
    if (window.__imgCache[src]) { setLoaded(window.__imgCache[src]); return; }
    queueImageLoad(src).then(result => {
      if (cancelled) return;
      if (result) setLoaded(result); else setFailed(true);
    });
    return () => { cancelled = true; };
  }, [src]);
  if (failed) return <div style={style} className={className} />;
  if (!loaded) return <div style={{ ...style, background: '#EFEAE1' }} className={className} />;
  return <img src={loaded} style={{ display: 'block', ...style, ...posStyle }} className={className} data-tick={tick} />;
}
window.StagedImg = StagedImg;

            <span style={{ fontSize: 10, fontWeight: active ? 700 : 500, letterSpacing: 1 }}>{t.label}</span>

}

                  width: '100%', padding: '7px 8px', fontSize: 12,
                  background: '#2A241C', color: '#F5F0E6',
                  border: '1px solid #3A332A', borderRadius: 4,
                  fontFamily: 'inherit', marginBottom: 10, cursor: 'pointer',
                }}
              >
                <optgroup label="コラムページ">
                  {pageTargets.map(t => (
                    <option key={t.id} value={t.id}>
                      {columns[t.id]?.text ? '●' : '○'} {t.name}
                    </option>
                  ))}
                </optgroup>
                <optgroup label="商品">
                  {products.map(p => (
                    <option key={p.id} value={p.id}>
                      {columns[p.id]?.text ? '●' : '○'} {p.name}
                    </option>
                  ))}
                </optgroup>
              </select>
              <TweakLabel>キャラクター</TweakLabel>
              <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 6, marginBottom: 10 }}>
                {CHARS.map(c => (
                  <button key={c.id}
                    onClick={() => updateCol({ character: c.id })}
                    style={{
                      padding: '6px 8px', fontSize: 11,
                      background: current.character === c.id ? '#F5F0E6' : 'transparent',
                      color: current.character === c.id ? '#1F1B16' : '#F5F0E6',
                      border: '1px solid ' + (current.character === c.id ? '#F5F0E6' : '#3A332A'),
                      borderRadius: 4, cursor: 'pointer', fontFamily: 'inherit',
                    }}>
                    {c.name}
                  </button>
                ))}
              </div>
              <TweakLabel>セリフ</TweakLabel>
              <textarea
                value={current.text}
                onChange={e => updateCol({ text: e.target.value })}
                placeholder="ひとこと…（空欄だと非表示）"
                rows={4}
                style={{
                  width: '100%', padding: '8px 10px', fontSize: 12,
                  background: '#2A241C', color: '#F5F0E6',
                  border: '1px solid #3A332A', borderRadius: 4,
                  fontFamily: 'inherit', lineHeight: 1.6, resize: 'vertical',
                  boxSizing: 'border-box', marginBottom: 8,
                }}
              />
              <div style={{ display: 'flex', gap: 6 }}>
                <button onClick={jumpToTarget} style={{
                  flex: 1, padding: '6px 8px', fontSize: 10,
                  background: 'transparent', color: '#F5F0E6',
                  border: '1px solid #F5F0E6', borderRadius: 4, cursor: 'pointer',
                  fontFamily: 'inherit',
                }}>ページを開く</button>
                <button onClick={clearCol} style={{
                  flex: 1, padding: '6px 8px', fontSize: 10,
                  background: 'transparent', color: '#F5F0E6',
                  border: '1px solid #3A332A', borderRadius: 4, cursor: 'pointer',
                  fontFamily: 'inherit',
                }}>このコラム削除</button>
              </div>
            </>
          );
        })()}
      </div>
    </div>
  );
}

function TweakLabel({ children }) {
  return (
    <div style={{ fontSize: 9, color: '#A89F94', letterSpacing: 2,
      fontFamily: 'JetBrains Mono, monospace', marginBottom: 5, textTransform: 'uppercase' }}>
      {children}
    </div>
  );
}

const ACCENTS = {
  purple: { main: '#6B5B9E', deep: '#4A3D7A', tint: '#EFEAF5' },
  forest: { main: '#4A6B4F', deep: '#2F4A33', tint: '#E6EDE7' },
  terracotta: { main: '#B8623F', deep: '#8A4527', tint: '#F4E5DD' },
};
window.ACCENTS = ACCENTS;

function App() {
  const [view, setView] = useState(() => localStorage.getItem('877-view') || 'home');
  const [selectedId, setSelectedId] = useState(() => localStorage.getItem('877-sel') || '877stand-tshirt');
  const [category, setCategory] = useState('all');
  const [search, setSearch] = useState('');
  const [faves, setFaves] = useState(() => {
    try { return JSON.parse(localStorage.getItem('877-faves') || '[]'); } catch { return []; }
  });
  const [tweaks, setTweaks] = useState(window.TWEAK_DEFAULTS || { layout: 'card', accent: 'purple', density: 'cozy' });
  const [tweaksOpen, setTweaksOpen] = useState(false);

  useEffect(() => { localStorage.setItem('877-view', view); }, [view]);
  useEffect(() => { localStorage.setItem('877-sel', selectedId); }, [selectedId]);
  useEffect(() => { localStorage.setItem('877-faves', JSON.stringify(faves)); }, [faves]);

  // Expose for related links
  window.__setSelId = setSelectedId;

  const toggleFave = (id) => setFaves(f => f.includes(id) ? f.filter(x => x !== id) : [...f, id]);
  const accent = window.ACCENTS[tweaks.accent] || window.ACCENTS.purple;

  // Edit mode wiring
  useEffect(() => {
    const onMsg = (e) => {
      if (!e.data) return;
      if (e.data.type === '__activate_edit_mode') setTweaksOpen(true);
      if (e.data.type === '__deactivate_edit_mode') setTweaksOpen(false);
    };
    window.addEventListener('message', onMsg);
    window.parent.postMessage({ type: '__edit_mode_available' }, '*');
    return () => window.removeEventListener('message', onMsg);
  }, []);

  const updateTweaks = (next) => {
    setTweaks(next);
    window.parent.postMessage({ type: '__edit_mode_set_keys', edits: next }, '*');
  };

  // Sync image positions to global so StagedImg can read them
  useEffect(() => {
    window.__imgPositions = tweaks.imagePositions || {};
    window.dispatchEvent(new Event('__imgPosChanged'));
  }, [tweaks.imagePositions]);

  // Compute iOS frame scale; also detect mobile for frameless rendering
  const [scale, setScale] = useState(1);
  const [isMobile, setIsMobile] = useState(false);
  useEffect(() => {
    const recalc = () => {
      const mob = window.innerWidth < 700;
      setIsMobile(mob);
      if (mob) {
        setScale(1);
      } else {
        const maxH = window.innerHeight - 40;
        const maxW = window.innerWidth - 40;
        const s = Math.min(maxH / 874, maxW / 402, 1);
        setScale(s);
      }
    };
    recalc();
    window.addEventListener('resize', recalc);
    return () => window.removeEventListener('resize', recalc);
  }, []);

  // Reset scroll on view / product change
  const scrollRef = React.useRef(null);
  useEffect(() => {
    if (scrollRef.current) scrollRef.current.scrollTop = 0;
    // Also reset window scroll for mobile (when frame is bypassed)
    if (isMobile) window.scrollTo(0, 0);
  }, [view, selectedId, isMobile]);

  const innerContent = (
    <div style={{ position: 'relative', width: '100%', height: '100%', overflow: 'hidden' }}>
      <div ref={scrollRef} style={{ position: 'absolute', inset: 0, overflowY: 'auto', overflowX: 'hidden' }}>
        {view === 'home' && React.createElement(window.HomeScreen, {
          setView, setSelectedId, accent, category, setCategory, search, setSearch, tweaks,
        })}
        {view === 'detail' && React.createElement(window.DetailScreen, {
          id: selectedId, setView, accent, faves, toggleFave, tweaks,
        })}
        {view === 'faves' && React.createElement(window.FavesScreen, {
          faves, toggleFave, setView, setSelectedId, accent,
        })}
        {view === 'about' && React.createElement(window.AboutScreen, {
          setView, accent, tweaks,
        })}
        {view === 'column-tshirt' && React.createElement(window.ColumnPageScreen, {
          setView, accent, tweaks, pageId: '__tshirt',
        })}
        {view === 'column-tenugui' && React.createElement(window.ColumnPageScreen, {
          setView, accent, tweaks, pageId: '__tenugui',
        })}
      </div>
      <TabBar view={view} setView={setView} accent={accent} />
    </div>
  );

  return (
    <>
      {isMobile ? (
        <div style={{ position: 'fixed', inset: 0, background: '#F5F0E6' }}>
          {innerContent}
        </div>
      ) : (
        <div style={{ transform: `scale(${scale})`, transformOrigin: 'center' }}>
          {React.createElement(window.IOSDevice, { width: 402, height: 874 }, innerContent)}
        </div>
      )}
      {tweaksOpen && !isMobile && <TweaksPanel tweaks={tweaks} setTweaks={updateTweaks} view={view} selectedId={selectedId} setSelectedId={setSelectedId} setView={setView} />}
    </>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
